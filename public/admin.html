<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cal Club - Food Database Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }

    /* Login */
    #login-container { max-width: 360px; margin: 120px auto; background: #fff; padding: 32px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    #login-container h2 { margin-bottom: 20px; text-align: center; }
    #login-container input { width: 100%; padding: 10px 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    #login-container button { width: 100%; padding: 10px; background: #e07c5a; color: #fff; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
    #login-container button:hover { background: #c96a4a; }
    #login-error { color: #d32f2f; font-size: 13px; margin-top: 8px; display: none; }

    /* Main App */
    #app { display: none; }
    header { background: #fff; padding: 16px 24px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 20px; color: #333; }
    #logout-btn { background: none; border: 1px solid #ddd; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }

    /* Stats bar */
    .stats-bar { display: flex; gap: 16px; padding: 16px 24px; background: #fff; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap; }
    .stat-card { padding: 8px 16px; background: #f8f8f8; border-radius: 6px; font-size: 13px; }
    .stat-card strong { font-size: 18px; display: block; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; padding: 12px 24px 0; background: #fff; }
    .tab { padding: 8px 20px; background: #f0f0f0; border: none; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 14px; }
    .tab.active { background: #e07c5a; color: #fff; }

    /* Filters */
    .filters { display: flex; gap: 12px; padding: 12px 24px; background: #fff; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap; align-items: center; }
    .filters input, .filters select { padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
    .filters input { min-width: 200px; }

    /* Table */
    .table-container { padding: 0 24px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; background: #fff; margin-top: 8px; font-size: 13px; }
    th { background: #f8f8f8; padding: 10px 8px; text-align: left; border-bottom: 2px solid #e0e0e0; font-weight: 600; white-space: nowrap; cursor: pointer; user-select: none; }
    th:hover { background: #eee; }
    td { padding: 8px; border-bottom: 1px solid #f0f0f0; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    tr:hover { background: #fafafa; }
    tr.selected { background: #fff3e0; }

    /* Checkbox column */
    .col-check { width: 32px; text-align: center; }
    .col-check input { cursor: pointer; }

    /* Aliases styling */
    .alias-tag { display: inline-block; background: #e8f5e9; color: #2e7d32; padding: 1px 6px; border-radius: 3px; font-size: 11px; margin: 1px 2px; }

    /* Status badges */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
    .badge-yes { background: #e8f5e9; color: #2e7d32; }
    .badge-no { background: #fce4ec; color: #c62828; }
    .badge-source { background: #e3f2fd; color: #1565c0; }

    /* Pagination */
    .pagination { display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; font-size: 13px; }
    .pagination button { padding: 6px 14px; border: 1px solid #ddd; background: #fff; border-radius: 6px; cursor: pointer; }
    .pagination button:disabled { opacity: 0.4; cursor: default; }

    /* Bulk actions */
    .bulk-actions { display: none; padding: 8px 24px; background: #fff8e1; border-bottom: 1px solid #e0e0e0; align-items: center; gap: 12px; font-size: 13px; }
    .bulk-actions.visible { display: flex; }
    .bulk-actions button { padding: 5px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .bulk-actions .btn-review { background: #4caf50; color: #fff; }
    .bulk-actions .btn-verify { background: #2196f3; color: #fff; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 8px; padding: 24px; width: 520px; max-height: 80vh; overflow-y: auto; }
    .modal h3 { margin-bottom: 16px; }
    .modal label { display: block; font-size: 12px; font-weight: 600; color: #666; margin: 10px 0 4px; }
    .modal input[type="text"], .modal input[type="number"], .modal select { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
    .modal .checkbox-row { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
    .modal .checkbox-row input { width: auto; }
    .modal .nutrition-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
    .modal-actions button { padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .btn-save { background: #e07c5a; color: #fff; border: none; }
    .btn-save:hover { background: #c96a4a; }
    .btn-cancel { background: #fff; border: 1px solid #ddd; }
    .btn-delete { background: #d32f2f; color: #fff; border: none; }

    /* Loading */
    .loading { text-align: center; padding: 40px; color: #999; }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-container">
  <h2>Food Database Admin</h2>
  <input type="email" id="login-email" placeholder="Admin email">
  <input type="password" id="login-password" placeholder="Admin password">
  <button onclick="login()">Sign In</button>
  <div id="login-error">Invalid credentials</div>
</div>

<!-- Main App -->
<div id="app">
  <header>
    <h1>Cal Club Food Database Admin</h1>
    <button id="logout-btn" onclick="logout()">Logout</button>
  </header>

  <div class="stats-bar" id="stats-bar"></div>

  <div class="tabs">
    <button class="tab active" data-tab="review" onclick="switchTab('review')">Review Queue (<span id="review-count">0</span>)</button>
    <button class="tab" data-tab="all" onclick="switchTab('all')">All Items (<span id="all-count">0</span>)</button>
  </div>

  <div class="filters">
    <input type="text" id="search-input" placeholder="Search by name or alias..." oninput="debounceSearch()">
    <select id="filter-source" onchange="loadItems()">
      <option value="">All Sources</option>
      <option value="USDA">USDA</option>
      <option value="IFCT">IFCT</option>
      <option value="LLM">LLM</option>
      <option value="MANUAL">MANUAL</option>
      <option value="INDB_DERIVED">INDB_DERIVED</option>
    </select>
    <select id="filter-category" onchange="loadItems()">
      <option value="">All Categories</option>
      <option value="protein">Protein</option>
      <option value="grain">Grain</option>
      <option value="fat">Fat</option>
      <option value="vegetable">Vegetable</option>
      <option value="fruit">Fruit</option>
      <option value="sauce">Sauce</option>
      <option value="beverage">Beverage</option>
      <option value="dairy">Dairy</option>
      <option value="nuts">Nuts</option>
      <option value="legumes">Legumes</option>
      <option value="gravy">Gravy</option>
      <option value="biryani_rice">Biryani/Rice</option>
      <option value="other">Other</option>
    </select>
  </div>

  <div class="bulk-actions" id="bulk-actions">
    <span><strong id="selected-count">0</strong> selected</span>
    <button class="btn-review" onclick="bulkMarkReviewed()">Mark Reviewed</button>
    <button style="background:#d32f2f;color:#fff" onclick="bulkDelete()">Delete Selected</button>
    <button onclick="clearSelection()">Clear Selection</button>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th class="col-check"><input type="checkbox" id="select-all" onchange="toggleSelectAll()"></th>
          <th onclick="sortBy('name')">Name</th>
          <th>Aliases</th>
          <th onclick="sortBy('category')">Category</th>
          <th onclick="sortBy('dataSource')">Source</th>
          <th onclick="sortBy('caloriesPer100g')">Cal</th>
          <th onclick="sortBy('proteinPer100g')">P</th>
          <th onclick="sortBy('carbsPer100g')">C</th>
          <th onclick="sortBy('fatPer100g')">F</th>
          <th onclick="sortBy('fiberPer100g')">Fiber</th>
          <th onclick="sortBy('verified')">Verified</th>
          <th onclick="sortBy('reviewed')">Reviewed</th>
          <th onclick="sortBy('usageCount')">Uses</th>
        </tr>
      </thead>
      <tbody id="items-tbody">
        <tr><td colspan="13" class="loading">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="pagination">
    <button id="prev-btn" onclick="prevPage()" disabled>&laquo; Previous</button>
    <span id="page-info">Page 1</span>
    <button id="next-btn" onclick="nextPage()">Next &raquo;</button>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3 id="modal-title">Edit Food Item</h3>

    <label>Name</label>
    <input type="text" id="edit-name">

    <label>Aliases (comma-separated)</label>
    <input type="text" id="edit-aliases">

    <label>Category</label>
    <select id="edit-category">
      <option value="protein">Protein</option>
      <option value="grain">Grain</option>
      <option value="fat">Fat</option>
      <option value="vegetable">Vegetable</option>
      <option value="fruit">Fruit</option>
      <option value="sauce">Sauce</option>
      <option value="beverage">Beverage</option>
      <option value="dairy">Dairy</option>
      <option value="nuts">Nuts</option>
      <option value="legumes">Legumes</option>
      <option value="gravy">Gravy</option>
      <option value="biryani_rice">Biryani/Rice</option>
      <option value="other">Other</option>
    </select>

    <label>Item Type</label>
    <select id="edit-itemType">
      <option value="single_item">Single Item</option>
      <option value="composite_dish">Composite Dish</option>
    </select>

    <label>Data Source</label>
    <select id="edit-dataSource">
      <option value="USDA">USDA</option>
      <option value="IFCT">IFCT</option>
      <option value="LLM">LLM</option>
      <option value="MANUAL">MANUAL</option>
      <option value="INDB_DERIVED">INDB_DERIVED</option>
    </select>

    <label>Nutrition per 100g</label>
    <div class="nutrition-grid">
      <div><label>Calories</label><input type="number" id="edit-calories" step="0.1"></div>
      <div><label>Protein (g)</label><input type="number" id="edit-protein" step="0.1"></div>
      <div><label>Carbs (g)</label><input type="number" id="edit-carbs" step="0.1"></div>
      <div><label>Fat (g)</label><input type="number" id="edit-fat" step="0.1"></div>
      <div><label>Fiber (g)</label><input type="number" id="edit-fiber" step="0.1"></div>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="edit-verified"> <label style="margin:0">Verified</label>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="edit-reviewed"> <label style="margin:0">Reviewed</label>
    </div>

    <div class="modal-actions">
      <button class="btn-delete" onclick="deleteItem()">Delete</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveItem()">Save</button>
    </div>
  </div>
</div>

<script>
  // State
  let currentTab = 'review';
  let currentPage = 1;
  let currentSort = '-createdAt';
  let selectedIds = new Set();
  let editingId = null;
  let searchTimeout = null;

  function getCredentials() {
    return {
      email: sessionStorage.getItem('adminEmail') || '',
      password: sessionStorage.getItem('adminPassword') || ''
    };
  }

  function authHeaders() {
    const { email, password } = getCredentials();
    return {
      'Content-Type': 'application/json',
      'x-admin-email': email,
      'x-admin-password': password
    };
  }

  // Auth
  async function login() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;

    try {
      const res = await fetch('/admin/api/stats', {
        headers: {
          'x-admin-email': email,
          'x-admin-password': password
        }
      });

      if (res.ok) {
        sessionStorage.setItem('adminEmail', email);
        sessionStorage.setItem('adminPassword', password);
        document.getElementById('login-container').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        loadStats();
        loadItems();
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    } catch (e) {
      document.getElementById('login-error').style.display = 'block';
    }
  }

  function logout() {
    sessionStorage.removeItem('adminEmail');
    sessionStorage.removeItem('adminPassword');
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-container').style.display = 'block';
    document.getElementById('login-email').value = '';
    document.getElementById('login-password').value = '';
  }

  // Check if already logged in
  function checkAuth() {
    const { email, password } = getCredentials();
    if (email && password) {
      document.getElementById('login-container').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadStats();
      loadItems();
    }
  }

  // Stats
  async function loadStats() {
    try {
      const res = await fetch('/admin/api/stats', { headers: authHeaders() });
      if (!res.ok) { if (res.status === 401) logout(); return; }
      const stats = await res.json();

      document.getElementById('review-count').textContent = stats.unreviewed;
      document.getElementById('all-count').textContent = stats.total;

      const bar = document.getElementById('stats-bar');
      bar.innerHTML = `
        <div class="stat-card"><strong>${stats.total}</strong>Total Items</div>
        <div class="stat-card"><strong>${stats.unreviewed}</strong>Unreviewed</div>
        ${Object.entries(stats.bySource).map(([k,v]) => `<div class="stat-card"><strong>${v}</strong>${k}</div>`).join('')}
      `;
    } catch (e) { console.error('Failed to load stats:', e); }
  }

  // Tab switching
  function switchTab(tab) {
    currentTab = tab;
    currentPage = 1;
    selectedIds.clear();
    updateBulkBar();
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    loadItems();
  }

  // Sort
  function sortBy(field) {
    if (currentSort === field) {
      currentSort = '-' + field;
    } else if (currentSort === '-' + field) {
      currentSort = field;
    } else {
      currentSort = field;
    }
    currentPage = 1;
    loadItems();
  }

  // Search debounce
  function debounceSearch() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => { currentPage = 1; loadItems(); }, 300);
  }

  // Load items
  async function loadItems() {
    const params = new URLSearchParams();
    params.set('page', currentPage);
    params.set('limit', 50);
    params.set('sort', currentSort);

    if (currentTab === 'review') params.set('reviewed', 'false');

    const search = document.getElementById('search-input').value.trim();
    if (search) params.set('search', search);

    const source = document.getElementById('filter-source').value;
    if (source) params.set('dataSource', source);

    const category = document.getElementById('filter-category').value;
    if (category) params.set('category', category);

    const tbody = document.getElementById('items-tbody');
    tbody.innerHTML = '<tr><td colspan="13" class="loading">Loading...</td></tr>';

    try {
      const res = await fetch(`/admin/api/food-items?${params}`, { headers: authHeaders() });
      if (!res.ok) { if (res.status === 401) logout(); return; }
      const data = await res.json();

      renderTable(data.items);
      renderPagination(data.pagination);
    } catch (e) {
      tbody.innerHTML = '<tr><td colspan="13" class="loading">Failed to load items</td></tr>';
    }
  }

  function renderTable(items) {
    const tbody = document.getElementById('items-tbody');
    if (items.length === 0) {
      tbody.innerHTML = '<tr><td colspan="13" class="loading">No items found</td></tr>';
      return;
    }

    tbody.innerHTML = items.map(item => {
      const aliasesHtml = (item.aliases || []).map(a => `<span class="alias-tag">${esc(a)}</span>`).join('');
      return `<tr onclick="openEdit('${item._id}')" class="${selectedIds.has(item._id) ? 'selected' : ''}">
        <td class="col-check"><input type="checkbox" ${selectedIds.has(item._id) ? 'checked' : ''} onclick="event.stopPropagation(); toggleSelect('${item._id}')"></td>
        <td title="${esc(item.name)}">${esc(item.name)}</td>
        <td>${aliasesHtml || '<span style="color:#ccc">-</span>'}</td>
        <td>${item.category || '-'}</td>
        <td><span class="badge badge-source">${item.dataSource}</span></td>
        <td>${item.caloriesPer100g}</td>
        <td>${item.proteinPer100g}</td>
        <td>${item.carbsPer100g}</td>
        <td>${item.fatPer100g}</td>
        <td>${item.fiberPer100g || 0}</td>
        <td><span class="badge ${item.verified ? 'badge-yes' : 'badge-no'}">${item.verified ? 'Yes' : 'No'}</span></td>
        <td><span class="badge ${item.reviewed ? 'badge-yes' : 'badge-no'}">${item.reviewed ? 'Yes' : 'No'}</span></td>
        <td>${item.usageCount || 0}</td>
      </tr>`;
    }).join('');
  }

  function esc(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function renderPagination(p) {
    document.getElementById('page-info').textContent = `Page ${p.page} of ${p.totalPages} (${p.total} items)`;
    document.getElementById('prev-btn').disabled = p.page <= 1;
    document.getElementById('next-btn').disabled = p.page >= p.totalPages;
  }

  function prevPage() { currentPage--; loadItems(); }
  function nextPage() { currentPage++; loadItems(); }

  // Selection
  function toggleSelect(id) {
    if (selectedIds.has(id)) selectedIds.delete(id);
    else selectedIds.add(id);
    updateBulkBar();
    // Re-render row classes
    document.querySelectorAll('#items-tbody tr').forEach(tr => {
      const cb = tr.querySelector('input[type="checkbox"]');
      if (cb) {
        const rowId = tr.getAttribute('onclick')?.match(/'([a-f0-9]{24})'/)?.[1];
        if (rowId) tr.classList.toggle('selected', selectedIds.has(rowId));
      }
    });
  }

  function toggleSelectAll() {
    const checkAll = document.getElementById('select-all').checked;
    document.querySelectorAll('#items-tbody input[type="checkbox"]').forEach(cb => {
      const tr = cb.closest('tr');
      const id = tr.getAttribute('onclick')?.match(/'([a-f0-9]{24})'/)?.[1];
      if (id) {
        if (checkAll) selectedIds.add(id);
        else selectedIds.delete(id);
        tr.classList.toggle('selected', checkAll);
        cb.checked = checkAll;
      }
    });
    updateBulkBar();
  }

  function clearSelection() {
    selectedIds.clear();
    document.getElementById('select-all').checked = false;
    document.querySelectorAll('#items-tbody input[type="checkbox"]').forEach(cb => { cb.checked = false; });
    document.querySelectorAll('#items-tbody tr').forEach(tr => tr.classList.remove('selected'));
    updateBulkBar();
  }

  function updateBulkBar() {
    const bar = document.getElementById('bulk-actions');
    document.getElementById('selected-count').textContent = selectedIds.size;
    bar.classList.toggle('visible', selectedIds.size > 0);
  }

  async function bulkMarkReviewed() {
    if (selectedIds.size === 0) return;
    try {
      const res = await fetch('/admin/api/food-items/bulk-review', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ ids: Array.from(selectedIds) })
      });
      if (res.ok) {
        selectedIds.clear();
        updateBulkBar();
        loadItems();
        loadStats();
      }
    } catch (e) { alert('Bulk review failed'); }
  }

  async function bulkDelete() {
    if (selectedIds.size === 0) return;
    if (!confirm(`Are you sure you want to delete ${selectedIds.size} item(s)? This cannot be undone.`)) return;
    try {
      const res = await fetch('/admin/api/food-items/bulk-delete', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ ids: Array.from(selectedIds) })
      });
      if (res.ok) {
        const data = await res.json();
        selectedIds.clear();
        updateBulkBar();
        loadItems();
        loadStats();
      } else {
        alert('Bulk delete failed');
      }
    } catch (e) { alert('Bulk delete failed'); }
  }

  // Edit Modal
  async function openEdit(id) {
    editingId = id;
    try {
      const res = await fetch(`/admin/api/food-items/${id}`, { headers: authHeaders() });
      if (!res.ok) return;
      const item = await res.json();

      document.getElementById('modal-title').textContent = `Edit: ${item.name}`;
      document.getElementById('edit-name').value = item.name || '';
      document.getElementById('edit-aliases').value = (item.aliases || []).join(', ');
      document.getElementById('edit-category').value = item.category || 'other';
      document.getElementById('edit-itemType').value = item.itemType || 'single_item';
      document.getElementById('edit-dataSource').value = item.dataSource || 'LLM';
      document.getElementById('edit-calories').value = item.caloriesPer100g || 0;
      document.getElementById('edit-protein').value = item.proteinPer100g || 0;
      document.getElementById('edit-carbs').value = item.carbsPer100g || 0;
      document.getElementById('edit-fat').value = item.fatPer100g || 0;
      document.getElementById('edit-fiber').value = item.fiberPer100g || 0;
      document.getElementById('edit-verified').checked = item.verified || false;
      document.getElementById('edit-reviewed').checked = item.reviewed || false;

      document.getElementById('edit-modal').classList.add('open');
    } catch (e) { alert('Failed to load item'); }
  }

  function closeModal() {
    document.getElementById('edit-modal').classList.remove('open');
    editingId = null;
  }

  async function saveItem() {
    if (!editingId) return;

    const aliasStr = document.getElementById('edit-aliases').value;
    const aliases = aliasStr ? aliasStr.split(',').map(a => a.trim()).filter(Boolean) : [];

    const body = {
      name: document.getElementById('edit-name').value,
      aliases,
      category: document.getElementById('edit-category').value,
      itemType: document.getElementById('edit-itemType').value,
      dataSource: document.getElementById('edit-dataSource').value,
      caloriesPer100g: parseFloat(document.getElementById('edit-calories').value),
      proteinPer100g: parseFloat(document.getElementById('edit-protein').value),
      carbsPer100g: parseFloat(document.getElementById('edit-carbs').value),
      fatPer100g: parseFloat(document.getElementById('edit-fat').value),
      fiberPer100g: parseFloat(document.getElementById('edit-fiber').value),
      verified: document.getElementById('edit-verified').checked,
      reviewed: document.getElementById('edit-reviewed').checked
    };

    try {
      const res = await fetch(`/admin/api/food-items/${editingId}`, {
        method: 'PATCH',
        headers: authHeaders(),
        body: JSON.stringify(body)
      });

      if (res.ok) {
        closeModal();
        loadItems();
        loadStats();
      } else {
        const err = await res.json();
        alert('Save failed: ' + (err.error || 'Unknown error'));
      }
    } catch (e) { alert('Save failed'); }
  }

  async function deleteItem() {
    if (!editingId) return;
    if (!confirm('Are you sure you want to delete this item?')) return;

    try {
      const res = await fetch(`/admin/api/food-items/${editingId}`, {
        method: 'DELETE',
        headers: authHeaders()
      });
      if (res.ok) {
        closeModal();
        loadItems();
        loadStats();
      }
    } catch (e) { alert('Delete failed'); }
  }

  // Close modal on overlay click
  document.getElementById('edit-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // Enter key on login
  document.getElementById('login-password').addEventListener('keyup', function(e) {
    if (e.key === 'Enter') login();
  });

  // Init
  checkAuth();
</script>
</body>
</html>
